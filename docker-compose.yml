services:
  qdrant:
    image: qdrant/qdrant:v1.12.1
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - qdrant_data:/qdrant/storage
  postgres:
    image: postgres:16.4
    environment:
      POSTGRES_PASSWORD: matchdev
      POSTGRES_DB: marketplace
    ports:
      - "5432:5432"
    volumes:
      - pg_data:/var/lib/postgresql/data
      - ./infra/postgres/init.sql:/docker-entrypoint-initdb.d/init.sql:ro

volumes:
  qdrant_data: {}
  pg_data: {}
