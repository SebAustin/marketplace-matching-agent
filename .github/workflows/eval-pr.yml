name: eval-pr
on:
  pull_request:
    branches: [main]

jobs:
  eval:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v4
        with:
          version: "0.5.11"
          python-version: "3.12.4"
      - run: uv sync --all-extras --frozen
      - run: uv run python evals/run_eval.py --mode both --limit 5 --output-dir evals/runs/pr
