name: ci

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint-type-test:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v4
        with:
          python-version: "3.12.4"
          enable-cache: true
      - name: uv sync
        run: uv sync --all-extras --frozen
      - name: ruff check
        run: uv run ruff check .
      - name: mypy --strict
        run: uv run mypy --strict src
      - name: pytest with 85% coverage gate
        run: uv run pytest -q
